name: Draft PDF

run-name: Draft PDF

# Add permissions
permissions:
  actions: write
  contents: write

# Specify branch
on: 
  push:
    branches: 
      - dev

# Job start
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1: Checkout code from repository
      - name: checkout repo
        uses: actions/checkout@v7

      # 2: Install pandoc dependencies
      - name: install dependencies
        run: |
          sudo apt update
          sudo apt install texlive texlive-latex-extra pandoc

      # 3: Convert MD to PDF
      - name: convert markdown to pdf
        run: pandoc -V geometry:margin=0.75in README.md -o Resume.pdf

      # 4: Make a release
      - name: generate draft tag
        run: |
          echo "tag=$(date +%F-%H-%M-%S)-draft" >> "$GITHUB_ENV"

      - name: publish draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create --draft $tag Resume.pdf

      # 5: Upload generated PDF as artifact
      - name: store artifact
        uses: actions/upload-artifact@v7
        with:
          name: Resume
          path: ./Resume.pdf
