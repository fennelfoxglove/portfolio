name: Doc to PDF

# Add permissions
permissions:
  actions: write
  contents: write

# Specify branch
on: 
  push:
    branches:
      - main

# Start job
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1: Checkout code from repository
      - name: checkout repo
        uses: actions/checkout@v7

      # 2: Install pandoc dependencies
      - name: install Dependencies
        run: |
          sudo apt update
          sudo apt install texlive texlive-latex-extra pandoc

      # 3: Tag release
      - name: generate tag
        run: |
          echo "tag=$(date +%F-%S)" >> "$GITHUB_ENV"

      - name: push tag
        uses: actions/github-script@v9
        with:
          script: |
            const {tag} = process.env
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha
            })

      # 4: Convert MD to PDF
      - name: convert markdown to pdf
        run: pandoc -V geometry:margin=0.75in README.md -o Resume.pdf

      - name: publish release and clean draft tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create $tag Resume.pdf
          for draft in $(gh release list --limit 999 |grep -i draft | cut -f 1); do \
            gh release delete $draft; \
          done

      # # 5: Upload generated PDF as artifact
      # - name: store artifact
      #   uses: actions/upload-artifact@v7
      #   with:
      #     name: Resume
      #     path: ./Resume.pdf
