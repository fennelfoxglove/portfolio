name: Doc to PDF

# Add permissions
permissions:
  actions: write
  contents: write

# Specify branch
on: 
  push:
    # branches:
    #   - main
    tags:
      - 'v*.*'

# Start job
jobs:
  build:
    env:
      VERSION: ${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      # 1: Checkout code from repository
      - name: checkout repo
        uses: actions/checkout@v7

      # 2: Install pandoc dependencies
      - name: install Dependencies
        run: |
          sudo apt update
          sudo apt install texlive texlive-latex-extra pandoc

      # 3: Convert MD to PDF
      - name: convert markdown to pdf
        run: pandoc -V geometry:margin=0.75in README.md -o Resume.pdf

      # 4: Generate tag
      - name: generate tag
        run: |
          echo "timestamp=$(date +%F)" >> "GITHUB_ENV"

      # 5: Push tag
      - name: push tag
        uses: actions/github-script@v9
        # env:
        #   VERSION: ${{ github.ref }}
        with:
          script: |
            const version = process.env.VERSION
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `${version}-release`,
              sha: context.sha
            })
            console.log(version)

        # 6: Create release
      - name: publish release and clean draft tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo $version
          gh release create $version Resume.pdf
          for draft in $(gh release list --limit 999 |grep -i draft | cut -f 1); do \
            gh release delete $draft; \
          done

      # 7: Upload generated PDF as artifact
      - name: store artifact
        uses: actions/upload-artifact@v7
        with:
          name: Resume
          path: ./Resume.pdf
