name: MD to PDF
run-name: Publish Resume PDF

permissions:
  actions: write
  contents: write

on:
  push:
    # branches:
    #   - main
    tags:
      - 'v*.*'

jobs: 
  Generate-Publish-PDF:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v7

      - name: install dependencies
        run: |
          sudo apt update
          sudo apt install texlive texlive-latex-extra pandoc

      - name: generate pdf
        run: |
          pandoc -V geometry:margin=0.75in -V pagestyle:empty README.md -o Resume.pdf

      - name: publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VER: ${{ github.ref_name }}
        run: |
          gh release create $VER Resume.pdf
          for draft in $(gh release list --limit 999 | grep -i draft | cut -f 1); do \
            gh release delete $draft; \
          done
