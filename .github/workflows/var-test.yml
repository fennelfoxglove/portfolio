name: Scripting

run-name: Scripting

# Add permissions
permissions:
  actions: write
  contents: write

# Specify branch
on: 
  push:
    branches: 
      - dev

# Job start
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1: Checkout code from repository
      - name: checkout repo
        uses: actions/checkout@v7

      # 2: Make a release
      - name: generate draft tag
        run: |
          echo "tag=$(date +%F-%H-%M-%S)-draft" >> "$GITHUB_ENV"
          echo "time=$(date +%N)" >> "$GITHUB_ENV"

      - name: push tag
        uses: actions/github-script@v9
        env:
          JERRY: ${{ github.ref_name }}
          NOBODY: ${{ github.ref }}
        with:
          script: |
            const tag = process.env.tag
            const time = process.env.time
            const jerry = process.env.JERRY
            const nobody = process.env.NOBODY
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}-${time}`,
              sha: context.sha
            })

            console.log(`Tag: ${tag}`)
            console.log(`Time: ${time}`)
            console.log(`Time: ${jerry}`)
            console.log(`Time: ${nobody}`)

